[bumpversion]
current_version = 0.2.1
commit = True
tag = True

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:a2a.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:README.md]
search = Version: {current_version}
replace = Version: {new_version}

[bumpversion:file(mcp-img):docker/Dockerfile]
search = onetrust-api[mcp]>={current_version}
replace = onetrust-api[mcp]>={new_version}

[bumpversion:file(agent-img):docker/Dockerfile]
search = onetrust-api[agent]>={current_version}
replace = onetrust-api[agent]>={new_version}

[bumpversion:file:onetrust_api/agent_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:onetrust_api/mcp_server.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
