default_language_version:
  python: python3
exclude: 'dotnet'
ci:
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit suggestions'
  autoupdate_schedule: 'monthly'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    - id: check-added-large-files
      exclude: 'onetrust_api/skills/.*-docs/'
    - id: check-ast
    - id: check-yaml
      args: ["--unsafe"]
    - id: check-toml
    - id: check-json
    - id: fix-byte-order-marker
      exclude: .gitignore
    - id: check-merge-conflict
    - id: detect-private-key
      exclude: '^onetrust_api/specs/.*'
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: no-commit-to-branch
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
    - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        exclude: ^(tests/|test/|scripts/|script/)
        types_or: [ python, pyi, jupyter ]
        args: ["--fix", "--ignore=E402"]
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["-L", "ans,linar,nam,tread,ot,"]
        exclude: |
            (?x)^(
              \./test/.*|
              \./tests/.*|
              onetrust_api/skills/.*-docs/.*|
              onetrust_api/specs/.*|
              onetrust_api/api/_operation_manifest\.py
            )$
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-black
        exclude: ^(tests/|test/|scripts/|script/)
  - repo: local
    hooks:
      - id: mcp-readme-table
        name: sync MCP tools table in README
        entry: |-
          bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.readme_tools; else python -m agent_utilities.mcp.readme_tools; fi'
        language: system
        files: ^(README\.md|.*/mcp_server\.py|.*/mcp/.*\.py)$
        pass_filenames: false
      - id: readme-env-vars
        name: sync env-vars table in README
        entry: |-
          bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.readme_env_vars; else python -m agent_utilities.mcp.readme_env_vars; fi'
        language: system
        files: ^(README\.md|\.env\.example)$
        pass_filenames: false
      - id: env-var-drift
        name: check env-var/config drift
        entry: bash -c 'if [ -f uv.lock ]; then uv run python -m agent_utilities.mcp.check_env_var_drift --check; else python -m agent_utilities.mcp.check_env_var_drift --check; fi'
        language: system
        pass_filenames: false
        files: ^(\.env\.example|mcp_config.*\.json|.*/mcp_config.*\.json|docker/.*compose.*\.ya?ml|.*/auth\.py|.*/mcp_server\.py)$
